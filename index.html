<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GreenPath Diagnostic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-content">
      <img src="logo.png" alt="Logo">
      <h1>GreenPath Diagnostic</h1>
    </div>
  </header>

  <div class="booking-cta">
    <button class="btn-book" onclick="openModal()">📅 Book Now</button>
  </div>

  <section class="section-divider">
    <h3>📍 Our Location</h3>
  </section>

  <div class="map-wrapper">
    <a href="https://www.google.com/maps/dir/?api=1&destination=22.442603,87.629621" target="_blank" title="Click to get directions">
      <div class="map-card">
        <iframe
          src="https://maps.google.com/maps?q=22.442603,87.629621&z=20&output=embed&t=k"
          style="border:0; width: 100%; height: 300px;"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </a>
  </div>

  <section class="section-divider">
    <h2>🩺 Our Services</h2>
  </section>

  <div class="cards-container">
    <div class="card">
      <img src="pathology.jpg" alt="Advanced Pathology">
      <p>Advanced Pathology</p>
    </div>
    <div class="card">
      <img src="ecg.jpg" alt="ECG">
      <p>ECG</p>
    </div>
    <div class="card">
      <img src="xray.jpg" alt="Digital X-Ray">
      <p>X-Ray</p>
    </div>
    <div class="card">
      <img src="ncv.jpg" alt="NCV">
      <p>NCV</p>
    </div>
    <div class="card">
      <img src="eeg.jpg" alt="EEG">
      <p>EEG</p>
    </div>
    <div class="card">
      <img src="pft.jpg" alt="PFT">
      <p>PFT</p>
    </div>
    <div class="card">
      <img src="hsg.jpg" alt="HSG">
      <p>HSG</p>
    </div>
  </div>

  <footer class="footer">
    <p>📞 Mobile: 9593966583 || 📩 gpmafijul@gmail.com</p>
  </footer>

  <div id="bookingModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 class="form-header">Book Appointment</h2>
      
      <form id="bookingForm" onsubmit="submitBooking(event)">
        
        <div class="form-group">
          <label for="fullName">Full Name <span style="color:red">*</span></label>
          <input type="text" id="fullName" name="fullName" required placeholder="Enter full name">
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number <span style="color:red">*</span></label>
          <input type="tel" id="mobile" name="mobile" required placeholder="10-digit Mobile No" pattern="[0-9]{10}">
        </div>

        <div class="form-group">
          <label for="email">Email Address <span style="color:red">*</span></label>
          <input type="email" id="email" name="email" required placeholder="Enter email for confirmation">
        </div>

        <div class="form-group">
          <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
              <label for="sex">Sex <span style="color:red">*</span></label>
              <select id="sex" name="sex" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div style="flex: 1;">
              <label for="age">Age <span style="color:red">*</span></label>
              <input type="number" id="age" name="age" required placeholder="Yrs" min="0" max="120">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="serviceCategory">Select Service <span style="color:red">*</span></label>
          <select id="serviceCategory" name="serviceCategory" required onchange="updateServiceOptions()">
            <option value="">-- Choose Category --</option>
            <option value="Doctor">Doctor Consultation</option>
            <option value="Pathology">Advanced Pathology</option>
            <option value="X-Ray">X-Ray</option>
            <option value="ECG">ECG</option>
            <option value="Biopsy">Biopsy</option>
            <option value="PFT">PFT</option>
          </select>
        </div>

        <div class="form-group">
          <label for="serviceType">Type of Service / Doctor <span style="color:red">*</span></label>
          <select id="serviceType" name="serviceType" required disabled>
            <option value="">-- Select Category First --</option>
          </select>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Confirm Booking</button>
        <div id="loadingMsg">Saving booking... please wait.</div>
      </form>
    </div>
  </div>

  <script>
    // --- 1. DATA FOR DROPDOWNS ---
    const serviceData = {
      "Doctor": ["Dr. S. Roy (Gen. Physician)", "Dr. A. Khan (Cardiologist)", "Dr. M. Das (Neurologist)", "Dr. P. Sen (Gynecologist)"],
      "Pathology": ["Blood Sugar (F/PP)", "Malaria/Dengue", "Sodium (Na+) / Potassium (K+)", "Thyroid Profile", "Complete Hemogram", "Lipid Profile"],
      "X-Ray": ["Chest PA View", "Knee Joint", "Spine", "Abdomen"],
      "ECG": ["Standard 12-lead ECG"],
      "Biopsy": ["Skin Biopsy", "Bone Marrow", "Needle Biopsy"],
      "PFT": ["Spirometry"]
    };

    // --- 2. MODAL FUNCTIONS ---
    const modal = document.getElementById("bookingModal");

    function openModal() {
      modal.style.display = "block";
    }

    function closeModal() {
      modal.style.display = "none";
      document.getElementById("bookingForm").reset(); 
      document.getElementById("serviceType").innerHTML = '<option value="">-- Select Category First --</option>';
      document.getElementById("serviceType").disabled = true;
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        closeModal();
      }
    }

    // --- 3. DYNAMIC DROPDOWN LOGIC ---
    function updateServiceOptions() {
      const category = document.getElementById("serviceCategory").value;
      const typeSelect = document.getElementById("serviceType");
      
      typeSelect.innerHTML = "";

      if (category && serviceData[category]) {
        typeSelect.disabled = false;
        let defaultOpt = document.createElement("option");
        defaultOpt.value = "";
        defaultOpt.text = "-- Select Specific Service --";
        typeSelect.add(defaultOpt);

        serviceData[category].forEach(function(item) {
          let option = document.createElement("option");
          option.value = item;
          option.text = item;
          typeSelect.add(option);
        });
      } else {
        typeSelect.disabled = true;
        let option = document.createElement("option");
        option.text = "-- Select Category First --";
        typeSelect.add(option);
      }
    }

    // --- 4. FORM SUBMISSION ---
    function submitBooking(e) {
      e.preventDefault(); 

      const form = document.getElementById("bookingForm");
      const submitBtn = document.getElementById("submitBtn");
      const loadingMsg = document.getElementById("loadingMsg");

      // ===> IMPORTANT: ENSURE THIS URL IS YOUR UPDATED GOOGLE SCRIPT URL <===
      const scriptURL = 'https://script.google.com/macros/s/AKfycbwEXj_Fj8SfS1_9io57au3ApL1AGiFERKngnZVVi6XeAGdDxvkpIJH174EgR8lbtaPy/exec';

      submitBtn.disabled = true;
      submitBtn.innerText = "Processing...";
      loadingMsg.style.display = "block";

      const formData = new FormData(form);

      fetch(scriptURL, {
        method: 'POST',
        body: formData
      })
      .then(response => {
        alert("Booking Successful! A confirmation email has been sent.");
        closeModal();
      })
      .catch(error => {
        console.error('Error!', error.message);
        alert("Booking saved, but there was a connection issue.");
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = "Confirm Booking";
        loadingMsg.style.display = "none";
      });
    }
  </script>

</body>
</html>
